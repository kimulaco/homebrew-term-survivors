name: Test Formula

on:
  pull_request:
    paths:
      - 'Formula/**'
  push:
    branches:
      - main
    paths:
      - 'Formula/**'
  workflow_dispatch:

jobs:
  check_pinact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: suzuki-shunsuke/pinact-action@28aeb220eb3252ad0d4422dd5d9368e925acbd8d # v1.3.0
        with:
          skip_push: "true"

  test-formula:
    needs: [check_pinact]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1.300.0
        with:
          ruby-version: '3.4.9'
          bundler-cache: false

      - name: Verify Formula syntax
        run: |
          ruby -c Formula/term-survivors.rb
          echo "✅ Formula syntax is valid"
      - name: Test URL accessibility
        run: |
          VERSION=$(awk -F '"' '/version[[:space:]]+/ {print $2; exit}' Formula/term-survivors.rb)
          echo "Testing URLs for version: $VERSION"

          for platform in "darwin-arm64" "darwin-x64" "linux-x64" "linux-arm64"; do
            URL="https://github.com/kimulaco/term-survivors/releases/download/v${VERSION}/term-survivors-${platform}.tar.gz"
            if curl -f -s -I "$URL" > /dev/null; then
              echo "✅ ${platform} URL accessible: $URL"
            else
              echo "❌ ${platform} URL not accessible: $URL"
              exit 1
            fi
          done
